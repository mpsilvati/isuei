<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="iSuei">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d3322"/>
      <stop offset="55%" stop-color="#2d6a4f"/>
      <stop offset="100%" stop-color="#52b788"/>
    </linearGradient>
    <linearGradient id="drop" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="55%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#52b788"/>
    </linearGradient>
    <filter id="ts" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="ds">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded background with diagonal gradient -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Soft radial highlight top-left to give depth -->
  <ellipse cx="130" cy="100" rx="220" ry="130" fill="#ffffff" opacity="0.10"/>

  <!-- Decorative speed/motion lines (very subtle, bottom-left) -->
  <g opacity="0.12" stroke="#ffffff" stroke-width="6" stroke-linecap="round">
    <line x1="56" y1="440" x2="120" y2="440"/>
    <line x1="78" y1="465" x2="120" y2="465"/>
  </g>

  <!-- Sweat drop accent (top-right corner) — slightly tilted -->
  <g transform="translate(415, 95) rotate(-8)" filter="url(#ds)">
    <path d="M 0 0 C 0 0, -44 66, -44 100 C -44 124, -24 142, 0 142 C 24 142, 44 124, 44 100 C 44 66, 0 0, 0 0 Z" fill="url(#drop)"/>
    <!-- Drop shine -->
    <ellipse cx="-15" cy="108" rx="11" ry="24" fill="#ffffff" opacity="0.65"/>
    <ellipse cx="-18" cy="80" rx="5" ry="9" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- Main wordmark "iSuei" -->
  <text x="256" y="345"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, 'Plus Jakarta Sans', system-ui, sans-serif"
        font-size="158" font-weight="900"
        fill="#ffffff" text-anchor="middle" letter-spacing="-8"
        filter="url(#ts)">iSuei</text>

  <!-- Brand accent bar under the wordmark -->
  <rect x="148" y="386" width="216" height="14" rx="7" fill="url(#accent)"/>

  <!-- Tagline (very small, optional but adds brand maturity) -->
  <text x="256" y="438"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif"
        font-size="22" font-weight="700"
        fill="#a7f3d0" text-anchor="middle" letter-spacing="6"
        opacity="0.92">TRAIN · TRACK · WIN</text>
</svg>
